<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS by frame</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #fef3c7; }
        
        .product-card { 
            aspect-ratio: 1 / 1; 
            border-radius: 1rem; 
            transition: transform 0.2s, box-shadow 0.2s; 
            border: 1px solid rgba(0,0,0,0.05);
            background-color: white;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }
        .product-card:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        
        .product-card img {
            border-radius: 0.75rem; 
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            margin-bottom: 0.75rem;
        }

        .hidden { display: none !important; }
        
        /* Loading Overlay */
        #loader {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.8);
            z-index: 200;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
    </style>
</head>
<body>

    <div id="loader" class="flex">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-orange-500 mb-4"></div>
        <p class="text-orange-600 font-bold">กำลังเชื่อมต่อข้อมูล...</p>
    </div>

    <section id="loginView" class="fixed inset-0 bg-orange-100 z-[100] flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-sm text-center">
            <div class="w-20 h-20 bg-orange-400 rounded-full flex items-center justify-center mx-auto mb-6 text-white text-3xl">
                <i class="fas fa-user-lock"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2">เข้าสู่ระบบ</h2>
            <input type="password" id="loginPin" placeholder="รหัส PIN" class="w-full border-2 border-gray-100 p-4 rounded-2xl text-center text-2xl tracking-[0.5em] outline-none mb-4">
            <button onclick="handleLogin()" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">ยืนยัน</button>
        </div>
    </section>

    <nav id="mainNav" class="p-4 flex justify-between items-center hidden">
        <button onclick="openMenu()" class="text-2xl text-gray-700"><i class="fas fa-bars"></i></button>
        <div class="flex items-center gap-3 bg-white px-4 py-2 rounded-full shadow-sm border">
            <span id="userBadge" class="text-xs font-bold text-orange-600 italic">User</span>
            <button onclick="handleLogout()" class="text-gray-400 text-[10px] underline">Logout</button>
        </div>
    </nav>

    <div id="sideMenu" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden" onclick="closeMenu()">
        <div class="bg-white w-64 h-full p-5 shadow-2xl" onclick="event.stopPropagation()">
            <h2 class="text-xl font-bold mb-6 border-b pb-4">เมนูหลัก</h2>
            <button onclick="toggleView('shop')" class="block w-full text-left py-3 px-4 hover:bg-orange-50 rounded-xl mb-2"><i class="fas fa-store mr-3 text-orange-500"></i> หน้าขายสินค้า</button>
            <div id="adminOnlyMenu" class="hidden">
                <button onclick="toggleView('admin')" class="block w-full text-left py-3 px-4 hover:bg-blue-50 rounded-xl text-blue-600 mb-2 font-medium"><i class="fas fa-boxes-stacked mr-3"></i> จัดการสินค้า/สต็อก</button>
            </div>
        </div>
    </div>

    <section id="shopView" class="container mx-auto px-4 pb-24 hidden">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
    </section>

    <section id="adminView" class="container mx-auto px-4 pb-10 hidden text-sm">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold">คลังสินค้า</h1>
            <div class="flex gap-2">
                <div class="bg-white p-2 rounded-xl border text-[10px] flex items-center gap-1">
                    QR: <input type="file" id="qrInput" class="w-20">
                </div>
                <button onclick="openProductModal()" class="bg-blue-600 text-white px-4 py-2 rounded-full text-xs">+ เพิ่ม</button>
            </div>
        </div>
        <div class="bg-white rounded-3xl shadow-sm overflow-hidden border">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b">
                    <tr><th class="p-4">รูป</th><th class="p-4">ชื่อ</th><th class="p-4">สต็อก</th><th class="p-4 text-right">ราคา</th><th class="p-4 text-center">จัดการ</th></tr>
                </thead>
                <tbody id="adminTableBody"></tbody>
            </table>
        </div>
    </section>

    <button id="cartFloatBtn" onclick="openCart()" class="fixed bottom-8 right-8 bg-[#10b981] text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center text-2xl z-40 hidden hover:scale-110 active:scale-90 transition-all">
        <i class="fas fa-shopping-cart"></i>
        <span id="cartCount" class="absolute -top-1 -right-1 bg-red-500 text-[10px] w-6 h-6 rounded-full flex items-center justify-center border-2 border-white font-bold">0</span>
    </button>

    <div id="cartModal" class="fixed inset-0 bg-black bg-opacity-60 z-[110] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col max-h-[85vh]">
            <div id="cartSummarySection">
                <div class="p-6 border-b flex justify-between items-center">
                    <h3 class="text-xl font-bold">รายการในรถเข็น</h3>
                    <button onclick="closeCart()" class="text-gray-400 text-3xl">&times;</button>
                </div>
                <div id="cartItemsList" class="p-6 space-y-3 overflow-y-auto max-h-[40vh]"></div>
                <div class="p-6 bg-gray-50 border-t space-y-4">
                    <div class="flex justify-between font-bold text-xl">
                        <span>ยอดรวมทั้งหมด:</span>
                        <span id="displayTotal">0 ฿</span>
                    </div>
                    <div class="flex gap-2">
                        <label class="flex-1 text-center bg-white border-2 p-3 rounded-2xl cursor-pointer has-[:checked]:border-green-500 transition-all">
                            <input type="radio" name="payType" value="เงินสด" checked class="hidden"> <span class="text-sm font-medium">เงินสด</span>
                        </label>
                        <label class="flex-1 text-center bg-white border-2 p-3 rounded-2xl cursor-pointer has-[:checked]:border-green-500 transition-all">
                            <input type="radio" name="payType" value="โอนสแกน" class="hidden"> <span class="text-sm font-medium">QR PromptPay</span>
                        </label>
                    </div>
                    <button onclick="goToCheckout()" class="w-full bg-[#10b981] text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-green-600 transition-all">ชำระเงิน</button>
                </div>
            </div>
            <div id="qrCheckoutSection" class="hidden p-8 text-center bg-white">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c5/PromptPay-logo.png" class="h-6 mx-auto mb-4">
                <p class="font-bold text-2xl mb-1 text-green-600" id="qrFinalTotal">0 ฿</p>
                <div class="bg-gray-100 p-4 rounded-3xl mb-8 w-48 h-48 mx-auto flex items-center justify-center border-2 border-dashed border-gray-300">
                    <img id="qrDisplayImg" src="" class="w-full h-full object-contain hidden">
                    <span id="qrNoImgMsg" class="text-[10px] text-red-400 px-4">ยังไม่ได้ตั้งค่า QR Code</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="openCart()" class="flex-1 bg-gray-100 py-3 rounded-xl font-bold">กลับ</button>
                    <button onclick="finishOrder()" class="flex-[2] bg-blue-600 text-white py-3 rounded-xl font-bold">ยืนยันรับเงิน</button>
                </div>
            </div>
        </div>
    </div>

    <div id="productModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-[120] flex items-center justify-center">
        <div class="bg-white p-6 rounded-3xl w-full max-w-sm mx-4">
            <h3 class="font-bold mb-4">ข้อมูลสินค้า</h3>
            <div class="space-y-4 text-sm">
                <input type="text" id="pName" placeholder="ชื่อสินค้า" class="w-full border p-3 rounded-xl outline-none">
                <input type="number" id="pPrice" placeholder="ราคาขาย (฿)" class="w-full border p-3 rounded-xl outline-none">
                <input type="number" id="pStock" placeholder="จำนวนสต็อก" class="w-full border p-3 rounded-xl outline-none">
                <input type="file" id="pImgFile" class="w-full text-xs border p-2 rounded-xl">
            </div>
            <div class="flex justify-end mt-6 gap-3 text-xs font-bold">
                <button onclick="closeProductModal()" class="text-gray-400">ยกเลิก</button>
                <button id="saveProdBtn" class="bg-blue-600 text-white px-6 py-2 rounded-xl">บันทึก</button>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = 'Https://script.google.com/macros/s/AKfycbz8KvvRKdOguM3CPhuycU19ZKFf7wdumRUu-ZEpgwSRvqq6S1mJsAMGYNE_Sy9bQ3YcQg/exec';
        
        let appUsers = {}; 
        let products = JSON.parse(localStorage.getItem('myProducts')) || [];
        let qrCodeImg = localStorage.getItem('qrCodeImg') || '';
        let currentUser = null;
        let editProdId = null;

        // โหลดข้อมูล Users จากชีตทันที
        async function fetchUsers() {
            try {
                const response = await fetch(scriptURL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'getUsers' }) 
                });
                appUsers = await response.json();
                document.getElementById('loader').classList.replace('flex', 'hidden');
            } catch (e) {
                alert('การเชื่อมต่อล้มเหลว กรุณาตรวจสอบอินเทอร์เน็ต');
            }
        }
        fetchUsers();

        function handleLogin() {
            const pin = document.getElementById('loginPin').value;
            if (appUsers[pin]) {
                currentUser = { ...appUsers[pin], pin };
                document.getElementById('loginView').classList.add('hidden');
                document.getElementById('mainNav').classList.remove('hidden');
                document.getElementById('cartFloatBtn').classList.remove('hidden');
                document.getElementById('userBadge').innerText = currentUser.name;
                
                // ตรวจสอบตำแหน่ง (Case Insensitive)
                const isAdmin = currentUser.role.toLowerCase() === 'admin';
                document.getElementById('adminOnlyMenu').classList.toggle('hidden', !isAdmin);
                
                toggleView('shop');
            } else { alert('PIN ไม่ถูกต้อง!'); }
        }

        function handleLogout() { location.reload(); }

        function openMenu() { document.getElementById('sideMenu').classList.remove('hidden'); }
        function closeMenu() { document.getElementById('sideMenu').classList.add('hidden'); }
        
        function toggleView(view) {
            closeMenu();
            ['shopView', 'adminView'].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.classList.add('hidden');
            });
            document.getElementById(view + 'View').classList.remove('hidden');
            if(view === 'shop') renderShop();
            if(view === 'admin') renderAdmin();
        }

        function renderShop() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map(p => {
                const qty = p.qty || 0;
                const stock = p.stock || 0;
                const isOut = stock <= 0;
                return `
                <div class="product-card ${isOut ? 'opacity-60 grayscale' : ''}">
                    <img src="${p.img || 'https://via.placeholder.com/150'}">
                    ${isOut ? '<div class="absolute top-2 left-2 bg-red-600 text-white text-[8px] px-2 py-1 rounded-full font-bold">หมด</div>' : ''}
                    <div class="flex justify-between items-end">
                        <div class="flex-1 truncate pr-2">
                            <p class="text-[10px] text-gray-400 truncate">${p.name}</p>
                            <p class="text-[9px] font-bold ${stock < 5 ? 'text-red-500' : 'text-blue-500'}">สต็อก: ${stock}</p>
                            <p class="text-sm font-bold text-gray-900">${p.price} ฿</p>
                        </div>
                        <div class="flex items-center gap-1">
                            <button onclick="updateQty(${p.id}, -1)" class="bg-red-500 text-white w-6 h-6 rounded-full flex items-center justify-center ${qty === 0 ? 'hidden' : ''}"><i class="fas fa-minus text-[8px]"></i></button>
                            <span class="text-green-600 font-bold text-xs ${qty === 0 ? 'hidden' : ''}">${qty}</span>
                            <button onclick="updateQty(${p.id}, 1)" ${isOut ? 'disabled' : ''} class="bg-[#10b981] text-white w-7 h-7 rounded-full flex items-center justify-center shadow-md"><i class="fas fa-plus text-[10px]"></i></button>
                        </div>
                    </div>
                </div>`;
            }).join('') || '<p class="col-span-full text-center py-20 text-gray-400">ยังไม่มีสินค้า</p>';
            updateCartBadge();
        }

        function updateQty(id, change) {
            const idx = products.findIndex(p => p.id === id);
            if(idx > -1) {
                const p = products[idx];
                if (change > 0 && (p.qty || 0) >= p.stock) return alert('สินค้าในสต็อกไม่พอ!');
                products[idx].qty = Math.max(0, (products[idx].qty || 0) + change);
                localStorage.setItem('myProducts', JSON.stringify(products));
                renderShop();
                if(!document.getElementById('cartModal').classList.contains('hidden')) renderCartItems();
            }
        }

        function updateCartBadge() {
            const totalQty = products.reduce((sum, p) => sum + (p.qty || 0), 0);
            const cartCount = document.getElementById('cartCount');
            const cartBtn = document.getElementById('cartFloatBtn');
            cartCount.innerText = totalQty;
            cartBtn.classList.toggle('hidden', totalQty === 0);
        }

        function openCart() {
            document.getElementById('cartModal').classList.remove('hidden');
            document.getElementById('cartSummarySection').classList.remove('hidden');
            document.getElementById('qrCheckoutSection').classList.add('hidden');
            renderCartItems();
        }
        function closeCart() { document.getElementById('cartModal').classList.add('hidden'); }

        function renderCartItems() {
            const list = products.filter(p => p.qty > 0);
            const container = document.getElementById('cartItemsList');
            let sum = 0;
            container.innerHTML = list.map(p => {
                sum += (p.price * p.qty);
                return `
                <div class="flex items-center gap-3 bg-white p-3 rounded-2xl border">
                    <img src="${p.img}" class="w-10 h-10 object-cover rounded-lg">
                    <div class="flex-1">
                        <p class="text-xs font-bold text-gray-700 truncate">${p.name}</p>
                        <p class="text-[10px] text-gray-400">${p.price} ฿ / ชิ้น</p>
                    </div>
                    <div class="flex items-center gap-3 bg-gray-50 px-2 py-1 rounded-xl">
                        <button onclick="updateQty(${p.id}, -1)" class="text-red-500"><i class="fas fa-minus-circle"></i></button>
                        <span class="text-sm font-bold w-4 text-center">${p.qty}</span>
                        <button onclick="updateQty(${p.id}, 1)" class="text-green-500"><i class="fas fa-plus-circle"></i></button>
                    </div>
                </div>`;
            }).join('') || '<p class="text-center text-gray-400">ว่างเปล่า</p>';
            document.getElementById('displayTotal').innerText = `${sum} ฿`;
        }

        function goToCheckout() {
            const total = products.reduce((sum, p) => sum + (p.price * (p.qty || 0)), 0);
            if(total === 0) return;
            const type = document.querySelector('input[name="payType"]:checked').value;
            if(type === 'โอนสแกน') {
                document.getElementById('cartSummarySection').classList.add('hidden');
                document.getElementById('qrCheckoutSection').classList.remove('hidden');
                document.getElementById('qrFinalTotal').innerText = `${total} ฿`;
                if(qrCodeImg) {
                    const img = document.getElementById('qrDisplayImg');
                    img.src = qrCodeImg;
                    img.classList.remove('hidden');
                    document.getElementById('qrNoImgMsg').classList.add('hidden');
                }
            } else { finishOrder(); }
        }

        async function finishOrder() {
            document.getElementById('loader').classList.replace('hidden', 'flex');
            
            const cartItems = products.filter(p => p.qty > 0);
            const items = cartItems.map(p => `${p.name} (${p.qty})`).join(', ');
            const totalQty = cartItems.reduce((sum, p) => sum + p.qty, 0);
            const totalPrice = cartItems.reduce((sum, p) => sum + (p.price * p.qty), 0);
            const payType = document.querySelector('input[name="payType"]:checked').value;
            const seller = currentUser.name;

            // ตัดสต็อกในเครื่อง
            products.forEach(p => {
                if(p.qty > 0) {
                    p.stock = (p.stock || 0) - p.qty;
                    p.qty = 0;
                }
            });

            // ส่งข้อมูลไป Google Sheets
            try { 
                await fetch(scriptURL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({ action: 'saveOrder', items, totalQty, totalPrice, payType, seller }) 
                }); 
            } catch (e) { console.error(e); }

            localStorage.setItem('myProducts', JSON.stringify(products));
            document.getElementById('loader').classList.replace('flex', 'hidden');
            closeCart();
            renderShop();
            alert('ทำรายการเรียบร้อย และบันทึกลงชีตแล้ว!');
        }

        // --- Admin Functions ---
        function renderAdmin() {
            document.getElementById('adminTableBody').innerHTML = products.map(p => `
                <tr class="border-b">
                    <td class="p-4"><img src="${p.img}" class="w-10 h-10 rounded"></td>
                    <td class="p-4 font-bold text-gray-600 text-xs">${p.name}</td>
                    <td class="p-4 font-bold ${p.stock < 5 ? 'text-red-500' : 'text-blue-500'}">${p.stock || 0}</td>
                    <td class="p-4 text-right font-bold">${p.price}฿</td>
                    <td class="p-4 text-center space-x-2">
                        <button onclick="editProduct(${p.id})" class="text-blue-500"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteProduct(${p.id})" class="text-red-400"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`).join('');
        }

        function openProductModal() { editProdId = null; document.getElementById('pName').value = ''; document.getElementById('pPrice').value = ''; document.getElementById('pStock').value = ''; document.getElementById('productModal').classList.remove('hidden'); }
        function closeProductModal() { document.getElementById('productModal').classList.add('hidden'); }

        document.getElementById('saveProdBtn').onclick = async () => {
            const name = document.getElementById('pName').value, price = document.getElementById('pPrice').value, stock = parseInt(document.getElementById('pStock').value) || 0, file = document.getElementById('pImgFile').files[0];
            if(!name || !price) return;
            let imgUrl = editProdId ? products.find(p => p.id === editProdId).img : 'https://via.placeholder.com/150';
            if(file) imgUrl = await toBase64(file);
            if(editProdId) {
                const i = products.findIndex(p => p.id === editProdId);
                products[i] = {...products[i], name, price, stock, img: imgUrl};
            } else { products.push({ id: Date.now(), name, price, stock, img: imgUrl, qty: 0 }); }
            localStorage.setItem('myProducts', JSON.stringify(products));
            closeProductModal();
            renderAdmin();
        };

        function editProduct(id) { 
            editProdId = id; const p = products.find(i => i.id === id); 
            document.getElementById('pName').value = p.name; document.getElementById('pPrice').value = p.price; document.getElementById('pStock').value = p.stock || 0; 
            document.getElementById('productModal').classList.remove('hidden'); 
        }
        function deleteProduct(id) { if(confirm('ลบสินค้านี้?')) { products = products.filter(p => p.id !== id); localStorage.setItem('myProducts', JSON.stringify(products)); renderAdmin(); } }

        document.getElementById('qrInput').onchange = async (e) => { 
            const file = e.target.files[0]; if(file) { qrCodeImg = await toBase64(file); localStorage.setItem('qrCodeImg', qrCodeImg); alert('บันทึก QR แล้ว'); } 
        };

        const toBase64 = file => new Promise((res, rej) => { const r = new FileReader(); r.readAsDataURL(file); r.onload = () => res(r.result); r.onerror = e => rej(e); });

        renderShop();
    </script>
</body>
</html>
