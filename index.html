<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS By Frame</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #fef3c7; }
        
        .product-card { 
            aspect-ratio: 1 / 1; 
            border-radius: 1.5rem; 
            transition: all 0.3s; 
            background-color: white;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 2px solid transparent;
        }
        .product-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: #10b981;
        }
        .product-card img {
            border-radius: 1rem; 
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
        }
        .hidden { display: none !important; }
        
        #loader {
            position: fixed; inset: 0; background: rgba(255,255,255,0.8);
            z-index: 200; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="loader" class="hidden">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-[#10b981]"></div>
    </div>

    <section id="loginView" class="fixed inset-0 bg-green-50 z-[100] flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[3rem] shadow-2xl w-full max-w-sm text-center">
            <div class="w-24 h-24 bg-[#10b981] rounded-full flex items-center justify-center mx-auto mb-6 text-white text-4xl shadow-lg">
                <i class="fas fa-home"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2 text-gray-800">เข้าสู่ระบบ</h2>
            <p class="text-gray-500 mb-6 text-sm">กรุณาใส่รหัส PIN เพื่อเข้าใช้งาน</p>
            <input type="password" id="loginPin" placeholder="••••" maxlength="6" class="w-full border-2 border-green-50 p-4 rounded-2xl text-center text-3xl tracking-[0.5em] outline-none focus:border-[#10b981] transition-all mb-4">
            <button onclick="handleLogin()" class="w-full bg-[#10b981] text-white py-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all">เข้าสู่ระบบ</button>
        </div>
    </section>

    <nav id="mainNav" class="p-4 flex justify-between items-center hidden">
        <div class="flex items-center gap-4">
            <div class="bg-white px-4 py-2 rounded-full shadow-sm border flex items-center gap-2">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span id="userBadge" class="text-sm font-bold text-gray-700">User</span>
            </div>
        </div>
        <button onclick="handleLogout()" class="text-red-400 text-sm font-bold bg-white px-4 py-2 rounded-full border shadow-sm">ออกจากระบบ</button>
    </nav>

    <section id="shopView" class="container mx-auto px-4 pb-24 hidden">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">รายการสินค้า</h1>
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
    </section>

    <button id="cartFloatBtn" onclick="openCart()" class="fixed bottom-8 right-8 bg-[#10b981] text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center text-2xl z-40 hidden hover:scale-110 active:scale-90 transition-all">
        <i class="fas fa-shopping-basket"></i>
        <span id="cartCount" class="absolute -top-1 -right-1 bg-red-500 text-xs w-6 h-6 rounded-full flex items-center justify-center border-2 border-white font-bold">0</span>
    </button>

    <div id="cartModal" class="fixed inset-0 bg-black bg-opacity-60 z-[110] hidden flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="bg-white w-full max-w-md rounded-t-[3rem] sm:rounded-[3rem] overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
            
            <div id="cartSummarySection">
                <div class="p-8 border-b flex justify-between items-center">
                    <h3 class="text-2xl font-bold">ตะกร้าสินค้า</h3>
                    <button onclick="closeCart()" class="text-gray-300 hover:text-gray-500 text-4xl">&times;</button>
                </div>
                <div id="cartItemsList" class="p-6 space-y-4 overflow-y-auto max-h-[40vh]"></div>
                <div class="p-8 bg-gray-50 space-y-4">
                    <div class="flex justify-between font-bold text-2xl">
                        <span>ยอดรวม:</span>
                        <span id="displayTotal" class="text-[#10b981]">0 ฿</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="flex-1 text-center bg-white border-2 p-4 rounded-2xl cursor-pointer has-[:checked]:border-green-500 has-[:checked]:bg-green-50 transition-all">
                            <input type="radio" name="payType" value="เงินสด" checked class="hidden"> 
                            <i class="fas fa-money-bill-wave mb-1 block"></i>
                            <span class="text-xs font-bold">เงินสด</span>
                        </label>
                        <label class="flex-1 text-center bg-white border-2 p-4 rounded-2xl cursor-pointer has-[:checked]:border-green-500 has-[:checked]:bg-green-50 transition-all">
                            <input type="radio" name="payType" value="โอนสแกน" class="hidden"> 
                            <i class="fas fa-qrcode mb-1 block"></i>
                            <span class="text-xs font-bold">Thai QR</span>
                        </label>
                    </div>
                    <button onclick="goToCheckout()" class="w-full bg-[#10b981] text-white py-5 rounded-[1.5rem] font-bold text-lg shadow-lg hover:bg-green-600 transition-all">ชำระเงิน</button>
                </div>
            </div>

            <div id="qrCheckoutSection" class="hidden p-8 text-center bg-white">
                <p class="text-gray-500 mb-2">สแกนเพื่อชำระเงิน</p>
                <p class="font-bold text-3xl mb-6 text-green-600" id="qrFinalTotal">0 ฿</p>
                <div class="bg-white p-4 rounded-3xl mb-8 w-64 h-64 mx-auto border-4 border-green-50 flex items-center justify-center">
                    <img id="qrDisplayImg" src="" class="w-full h-full object-contain hidden">
                    <div id="qrNoImgMsg" class="text-red-400 text-sm">กำลังโหลด QR Code...</div>
                </div>
                <div class="flex gap-3">
                    <button onclick="openCart()" class="flex-1 bg-gray-100 py-4 rounded-2xl font-bold">กลับ</button>
                    <button onclick="finishOrder()" class="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">เสร็จสิ้น</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbznnNLlrN_mMJAzOd14L6u1G2Ey0klUNP4Go7jU_zg_Giqv5sX4l7HG8ZKSUIfjMbeArw/exec";
        
        let products = [];
        let qrCodeImg = "";
        let currentUser = null;

        async function initApp() {
            showLoading(true);
            try {
                const resp = await fetch(`${SCRIPT_URL}?action=getInitialData`);
                const data = await resp.json();
                products = data.products.map((p, i) => ({
                    id: i, name: p[0], price: p[1], stock: p[2], img: p[3], qty: 0
                }));
                qrCodeImg = data.qr;
                renderShop();
            } catch (err) {
                console.error("เชื่อมต่อล้มเหลว:", err);
            }
            showLoading(false);
        }

        async function handleLogin() {
            const pin = document.getElementById('loginPin').value;
            if(!pin) return;
            showLoading(true);
            try {
                const resp = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'login', pin: pin })
                });
                const result = await resp.json();
                if (result.success) {
                    currentUser = { name: result.name, role: result.role, pin: pin };
                    document.getElementById('loginView').classList.add('hidden');
                    document.getElementById('mainNav').classList.remove('hidden');
                    document.getElementById('userBadge').innerText = currentUser.name;
                    toggleView('shop');
                } else {
                    alert("รหัส PIN ไม่ถูกต้อง");
                }
            } catch (e) { alert("การเชื่อมต่อมีปัญหา"); }
            showLoading(false);
        }

        function renderShop() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map(p => {
                const isOut = p.stock <= 0;
                return `
                <div class="product-card ${isOut ? 'opacity-50' : ''}">
                    <img src="${p.img || 'https://via.placeholder.com/150'}">
                    <div class="mt-3">
                        <p class="text-sm font-bold text-gray-800 truncate">${p.name}</p>
                        <p class="text-xs ${p.stock < 5 ? 'text-red-500' : 'text-gray-400'} font-medium">คลัง: ${p.stock}</p>
                    </div>
                    <div class="flex justify-between items-center mt-2">
                        <p class="text-lg font-bold text-gray-900">${p.price}฿</p>
                        <div class="flex items-center gap-2">
                            ${p.qty > 0 ? `
                                <button onclick="updateQty(${p.id}, -1)" class="w-8 h-8 bg-red-100 text-red-500 rounded-full flex items-center justify-center"><i class="fas fa-minus text-xs"></i></button>
                                <span class="font-bold text-sm">${p.qty}</span>
                            ` : ''}
                            <button onclick="updateQty(${p.id}, 1)" ${isOut ? 'disabled' : ''} class="w-10 h-10 bg-[#10b981] text-white rounded-full flex items-center justify-center shadow-md active:scale-90 transition-all"><i class="fas fa-plus text-sm"></i></button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            updateCartBadge();
        }

        function updateQty(id, change) {
            const p = products[id];
            if (change > 0 && p.qty >= p.stock) return alert('สินค้าในสต็อกไม่พอ!');
            p.qty = Math.max(0, p.qty + change);
            renderShop();
            if(!document.getElementById('cartModal').classList.contains('hidden')) renderCartItems();
        }

        function updateCartBadge() {
            const totalQty = products.reduce((sum, p) => sum + p.qty, 0);
            document.getElementById('cartCount').innerText = totalQty;
            document.getElementById('cartFloatBtn').classList.toggle('hidden', totalQty === 0);
        }

        function openCart() {
            document.getElementById('cartModal').classList.remove('hidden');
            document.getElementById('cartSummarySection').classList.remove('hidden');
            document.getElementById('qrCheckoutSection').classList.add('hidden');
            renderCartItems();
        }

        function renderCartItems() {
            const list = products.filter(p => p.qty > 0);
            const container = document.getElementById('cartItemsList');
            let sum = 0;
            container.innerHTML = list.map(p => {
                sum += (p.price * p.qty);
                return `
                <div class="flex items-center gap-4 bg-gray-50 p-4 rounded-3xl">
                    <img src="${p.img}" class="w-12 h-12 object-cover rounded-xl shadow-sm">
                    <div class="flex-1">
                        <p class="text-sm font-bold text-gray-700">${p.name}</p>
                        <p class="text-xs text-gray-400">${p.price} ฿</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="updateQty(${p.id}, -1)" class="text-red-400"><i class="fas fa-minus-circle text-xl"></i></button>
                        <span class="font-bold w-4 text-center">${p.qty}</span>
                        <button onclick="updateQty(${p.id}, 1)" class="text-green-500"><i class="fas fa-plus-circle text-xl"></i></button>
                    </div>
                </div>`;
            }).join('') || '<p class="text-center py-10 text-gray-400">ไม่มีสินค้าในตะกร้า</p>';
            document.getElementById('displayTotal').innerText = `${sum} ฿`;
        }

        function goToCheckout() {
            const total = products.reduce((sum, p) => sum + (p.price * p.qty), 0);
            if(total === 0) return;
            
            const type = document.querySelector('input[name="payType"]:checked').value;
            
            // เช็คเงื่อนไขโอนสแกนให้ตรงกับ HTML
            if(type === 'โอนสแกน') {
                document.getElementById('cartSummarySection').classList.add('hidden');
                document.getElementById('qrCheckoutSection').classList.remove('hidden');
                document.getElementById('qrFinalTotal').innerText = `${total} ฿`;
                if(qrCodeImg) {
                    document.getElementById('qrDisplayImg').src = qrCodeImg;
                    document.getElementById('qrDisplayImg').classList.remove('hidden');
                    document.getElementById('qrNoImgMsg').classList.add('hidden');
                } else {
                    document.getElementById('qrNoImgMsg').innerText = "ไม่พบรูป QR ในระบบ";
                }
            } else { 
                finishOrder(); 
            }
        }

        async function finishOrder() {
            const cartItems = products.filter(p => p.qty > 0);
            const orderData = {
                action: 'checkout',
                items: cartItems.map(p => `${p.name} (${p.qty})`).join(', '),
                totalQty: cartItems.reduce((sum, p) => sum + p.qty, 0),
                totalPrice: cartItems.reduce((sum, p) => sum + (p.price * p.qty), 0),
                payType: document.querySelector('input[name="payType"]:checked').value,
                seller: currentUser.name,
                cart: cartItems
            };

            showLoading(true);
            try {
                const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(orderData) });
                const result = await resp.json();
                if(result.success) {
                    // บันทึกสำเร็จแล้วรีโหลดหน้าสินค้าทันที
                    location.reload(); 
                }
            } catch (e) { 
                showLoading(false);
                alert("บันทึกข้อมูลล้มเหลว"); 
            }
        }

        function toggleView(view) {
            document.getElementById('shopView').classList.toggle('hidden', view !== 'shop');
        }
        function closeCart() { document.getElementById('cartModal').classList.add('hidden'); }
        function handleLogout() { location.reload(); }
        function showLoading(show) { document.getElementById('loader').classList.toggle('hidden', !show); }

        initApp();
    </script>
</body>
</html>
