<section id="loginView" class="fixed inset-0 bg-green-50 z-[100] flex items-center justify-center p-6">
    <div class="bg-white p-8 rounded-[3rem] shadow-2xl w-full max-w-sm text-center">
        <div class="w-24 h-24 bg-[#10b981] rounded-full flex items-center justify-center mx-auto mb-6 text-white text-4xl shadow-lg">
            <i class="fas fa-store"></i>
        </div>
        <h2 class="text-2xl font-bold mb-2 text-gray-800">เข้าสู่ระบบ</h2>
        <input type="password" id="loginPin" name="user-pin-access" autocomplete="current-password" placeholder="••••" maxlength="6" class="w-full border-2 border-green-50 p-4 rounded-2xl text-center text-3xl tracking-[0.5em] outline-none focus:border-[#10b981] mb-4 text-gray-800">
        <button onclick="handleLogin()" class="w-full bg-[#10b981] text-white py-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all">เข้าสู่ระบบ</button>
    </div>
</section>

<script>
    // ... โค้ดส่วนอื่นๆ คงเดิม ...

    // 2. ส่วนของฟังก์ชัน Login (แก้ไขบรรทัดที่ 226)
    async function handleLogin() {
        const pinInput = document.getElementById('loginPin');
        const pin = pinInput.value;
        if(!pin) return;
        
        showLoading(true);
        try {
            const resp = await fetch(SCRIPT_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'login', pin: pin }) 
            });
            const result = await resp.json();
            
            if (result.success) {
                currentUser = { name: result.name, role: result.role, pin: pin };
                localStorage.setItem('pos_user', JSON.stringify(currentUser));
                
                // ล้างค่าใน input ก่อน reload เพื่อไม่ให้ Chrome จำรหัสที่รั่วไหล
                pinInput.value = ""; 
                location.reload();
            } else { 
                alert("PIN ไม่ถูกต้อง"); 
                pinInput.value = ""; // ล้างค่าเมื่อกรอกผิดด้วย
            }
        } catch (e) { 
            alert("การเชื่อมต่อล้มเหลว"); 
        }
        showLoading(false);
    }
</script>
