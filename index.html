<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS By Frame</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');
        
        /* พื้นฐาน */
        body { font-family: 'Kanit', sans-serif; transition: background-color 0.3s, color 0.3s; }
        body.light-mode { background-color: #f0fdf4; color: #1f2937; }
        body.dark-mode { background-color: #121212 !important; color: #ffffff !important; }

        /* การ์ดสินค้า */
        .bg-card { background-color: white; border: 1px solid #e5e7eb; }
        body.dark-mode .bg-card { background-color: #1e1e1e !important; border-color: #333 !important; }
        
        .product-card { 
            aspect-ratio: 1 / 1; border-radius: 1.5rem; transition: all 0.3s; padding: 1rem;
            display: flex; flex-direction: column; justify-content: space-between;
            cursor: pointer;
        }
        .product-card:hover { transform: translateY(-5px); border-color: #10b981; }
        .product-card img { border-radius: 1rem; width: 100%; aspect-ratio: 1/1; object-fit: cover; }

        /* แก้ไขปัญหาตัวหนังสือใน Dark Mode ของมือถือ */
        body.dark-mode .text-dark-fix { color: #ffffff !important; }
        body.dark-mode .text-gray-fix { color: #a1a1aa !important; }
        
        /* สวิตช์ */
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(24px); }

        .hidden { display: none !important; }
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; display: flex; align-items: center; justify-content: center; }
        
        /* Radio Selection */
        label:has(input:checked) {
            border-color: #10b981 !important;
            background-color: rgba(16, 185, 129, 0.1) !important;
        }
    </style>
</head>
<body class="light-mode">

    <div id="loader" class="hidden"><div class="animate-spin rounded-full h-16 w-16 border-t-4 border-[#10b981]"></div></div>

    <section id="loginView" class="fixed inset-0 bg-green-50 dark:bg-[#0f172a] z-[200] flex items-center justify-center p-6">
        <div class="bg-white dark:bg-[#1e1e1e] p-8 rounded-[3rem] shadow-2xl w-full max-w-sm text-center border dark:border-[#333]">
            <div class="w-20 h-20 bg-[#10b981] rounded-full flex items-center justify-center mx-auto mb-6 text-white text-3xl shadow-lg">
                <i class="fas fa-cash-register"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2 text-gray-800 dark:text-white">POS Login</h2>
            <input type="tel" id="loginPin" placeholder="PIN" maxlength="6" style="-webkit-text-security: disc;"
                   class="w-full border-2 border-gray-100 dark:border-[#333] p-4 rounded-2xl text-center text-2xl tracking-widest outline-none focus:border-[#10b981] mb-4 dark:bg-[#121212] dark:text-white">
            <button onclick="handleLogin()" class="w-full bg-[#10b981] text-white py-4 rounded-2xl font-bold text-lg active:scale-95 transition-all">เข้าสู่ระบบ</button>
        </div>
    </section>

    <nav id="mainNav" class="p-4 flex justify-between items-center hidden">
        <div class="bg-white dark:bg-[#1e1e1e] px-4 py-2 rounded-full shadow-sm border dark:border-[#333] flex items-center gap-3">
            <button onclick="openAdminSettings()" class="flex items-center gap-2">
                <span id="userBadge" class="text-sm font-bold text-gray-700 dark:text-white">User</span>
            </button>
            <button onclick="toggleDarkMode()" id="themeBtn" class="text-gray-400 border-l pl-2 dark:border-[#444]"><i class="fas fa-moon"></i></button>
        </div>
        <button onclick="handleLogout()" class="text-red-500 font-bold bg-white dark:bg-[#1e1e1e] px-4 py-2 rounded-full border dark:border-[#333] text-sm">Log Out</button>
    </nav>

    <main id="shopView" class="container mx-auto px-4 pb-24 hidden">
        <h1 class="text-2xl font-bold my-6 dark:text-white">รายการสินค้า</h1>
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
    </main>

    <section id="adminSettingsView" class="container mx-auto px-4 pb-24 hidden">
        <button onclick="toggleView('shop')" class="mt-6 mb-4 text-[#10b981] font-bold"><i class="fas fa-arrow-left"></i> กลับไปหน้าขาย</button>
        <div class="bg-card p-6 rounded-[2rem]">
            <h3 class="text-lg font-bold mb-4 dark:text-white">ตั้งค่าโปรโมชั่น</h3>
            <div class="flex items-center justify-between p-4 bg-green-50 dark:bg-green-900/10 rounded-2xl">
                <p class="text-sm dark:text-green-400">โปรโมชั่นซื้อ 3 ลด 10฿</p>
                <label class="switch">
                    <input type="checkbox" id="promoToggle" onchange="updatePromoState()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </section>

    <button id="cartFloatBtn" onclick="openCart()" class="fixed bottom-6 right-6 bg-[#10b981] text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center text-2xl z-40 hidden active:scale-90 transition-all">
        <i class="fas fa-shopping-basket"></i>
        <span id="cartCount" class="absolute -top-1 -right-1 bg-red-500 text-[10px] w-6 h-6 rounded-full flex items-center justify-center border-2 border-white font-bold">0</span>
    </button>

    <div id="cartModal" class="fixed inset-0 bg-black/60 z-[110] hidden flex items-end sm:items-center justify-center">
        <div class="bg-white dark:bg-[#1e1e1e] w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] overflow-hidden flex flex-col max-h-[85vh] border-t dark:border-[#333]">
            
            <div id="cartSummarySection">
                <div class="p-6 border-b dark:border-[#333] flex justify-between items-center">
                    <h3 class="text-xl font-bold dark:text-white">ตะกร้าสินค้า</h3>
                    <button onclick="closeCart()" class="text-gray-400 text-3xl">&times;</button>
                </div>
                <div id="cartItemsList" class="p-4 space-y-3 overflow-y-auto max-h-[35vh]"></div>
                
                <div class="p-6 bg-gray-50 dark:bg-[#252525] border-t dark:border-[#333]">
                    <div class="flex justify-between items-end mb-6">
                        <div>
                            <p class="text-xs text-gray-400">รวมทั้งสิ้น</p>
                            <p id="displayTotal" class="text-3xl font-bold text-[#10b981]">0 ฿</p>
                        </div>
                        <button onclick="clearCart()" class="text-red-500 bg-red-50 dark:bg-red-900/20 px-4 py-2 rounded-xl text-xs font-bold">ล้างตะกร้า</button>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <label class="flex flex-col items-center p-3 rounded-2xl border-2 dark:border-[#444] bg-white dark:bg-[#333] cursor-pointer text-gray-800 dark:text-white">
                            <input type="radio" name="payType" value="เงินสด" checked class="hidden">
                            <i class="fas fa-money-bill-wave mb-1"></i>
                            <span class="text-[10px] font-bold">เงินสด</span>
                        </label>
                        <label class="flex flex-col items-center p-3 rounded-2xl border-2 dark:border-[#444] bg-white dark:bg-[#333] cursor-pointer text-gray-800 dark:text-white">
                            <input type="radio" name="payType" value="สแกนจ่าย" class="hidden">
                            <i class="fas fa-qrcode mb-1"></i>
                            <span class="text-[10px] font-bold">สแกนจ่าย</span>
                        </label>
                    </div>
                    <button onclick="goToCheckout()" class="w-full bg-[#10b981] text-white py-4 rounded-2xl font-bold text-lg active:scale-95 shadow-lg">ชำระเงิน</button>
                </div>
            </div>

            <div id="qrCheckoutSection" class="hidden p-8 text-center bg-white dark:bg-[#1e1e1e]">
                <p class="text-sm dark:text-white mb-1">สแกน QR Code</p>
                <p id="qrFinalTotal" class="text-4xl font-bold text-[#10b981] mb-6">0 ฿</p>
                <div class="bg-white p-4 rounded-3xl mb-8 w-60 h-60 mx-auto border shadow-inner flex items-center justify-center">
                    <img id="qrDisplayImg" src="" class="w-full h-full object-contain hidden">
                    <div id="qrNoImgMsg" class="text-gray-300 text-xs">กำลังสร้าง QR...</div>
                </div>
                <div class="flex gap-3">
                    <button onclick="backToCartSummary()" class="flex-1 bg-gray-200 dark:bg-gray-700 dark:text-white py-4 rounded-2xl font-bold active:scale-95">กลับ</button>
                    <button onclick="finishOrder()" class="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95">เสร็จสิ้นการขาย</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbznnNLlrN_mMJAzOd14L6u1G2Ey0klUNP4Go7jU_zg_Giqv5sX4l7HG8ZKSUIfjMbeArw/exec";
        const PROMPTPAY_ID = "0953456962";
        
        let products = [];
        let currentUser = null;
        let isPromoActive = false;

        function toggleDarkMode() {
            const body = document.body;
            const btn = document.getElementById('themeBtn').querySelector('i');
            if (body.classList.contains('light-mode')) {
                body.classList.replace('light-mode', 'dark-mode');
                btn.classList.replace('fa-moon', 'fa-sun');
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.replace('dark-mode', 'light-mode');
                btn.classList.replace('fa-sun', 'fa-moon');
                localStorage.setItem('theme', 'light');
            }
        }

        async function initApp() {
            showLoading(true);
            if (localStorage.getItem('theme') === 'dark') toggleDarkMode();
            isPromoActive = localStorage.getItem('promo_state') === 'true';
            document.getElementById('promoToggle').checked = isPromoActive;

            const savedUser = localStorage.getItem('pos_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                document.getElementById('loginView').classList.add('hidden');
                document.getElementById('mainNav').classList.remove('hidden');
                document.getElementById('shopView').classList.remove('hidden');
                document.getElementById('userBadge').innerText = currentUser.name;
            }

            try {
                const resp = await fetch(`${SCRIPT_URL}?action=getInitialData`);
                const data = await resp.json();
                products = data.products.map((p, i) => ({
                    id: i, name: p[0], price: p[1], stock: p[2], img: p[3], qty: 0
                }));
                renderShop();
            } catch (err) { console.error("Data Load Error:", err); }
            showLoading(false);
        }

        async function handleLogin() {
            const pin = document.getElementById('loginPin').value;
            if(!pin) return;
            showLoading(true);
            try {
                const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'login', pin: pin }) });
                const result = await resp.json();
                if (result.success) {
                    localStorage.setItem('pos_user', JSON.stringify({ name: result.name, role: result.role }));
                    location.reload();
                } else { alert("รหัส PIN ไม่ถูกต้อง"); }
            } catch (e) { alert("เชื่อมต่อผิดพลาด"); }
            showLoading(false);
        }

        function renderShop() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map(p => `
                <div class="product-card bg-card ${p.stock <= 0 ? 'opacity-50 grayscale pointer-events-none' : ''}" onclick="updateQty(${p.id}, 1)">
                    <img src="${p.img || 'https://via.placeholder.com/150'}">
                    <div class="mt-2">
                        <p class="text-xs font-bold truncate dark:text-white">${p.name}</p>
                        <p class="text-[10px] text-gray-400">คลัง: ${p.stock}</p>
                    </div>
                    <div class="flex justify-between items-center mt-1">
                        <p class="text-sm font-bold text-[#10b981]">${p.price}฿</p>
                        <div class="flex items-center gap-1" onclick="event.stopPropagation()">
                            ${p.qty > 0 ? `<span class="text-xs font-bold dark:text-white mr-1">${p.qty}</span>` : ''}
                            <button class="w-7 h-7 bg-[#10b981] text-white rounded-full flex items-center justify-center text-xs"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>
                </div>`).join('');
            updateCartBadge();
        }

        function updateQty(id, change) {
            const p = products[id];
            if (change > 0 && p.qty >= p.stock) return;
            p.qty = Math.max(0, p.qty + change);
            renderShop();
            if(!document.getElementById('cartModal').classList.contains('hidden')) renderCartItems();
        }

        function updateCartBadge() {
            const total = products.reduce((sum, p) => sum + p.qty, 0);
            document.getElementById('cartCount').innerText = total;
            document.getElementById('cartFloatBtn').classList.toggle('hidden', total === 0);
        }

        function renderCartItems() {
            const list = products.filter(p => p.qty > 0);
            const container = document.getElementById('cartItemsList');
            const { final } = calculateTotal();

            container.innerHTML = list.map(p => `
                <div class="flex items-center gap-3 bg-gray-50 dark:bg-[#333] p-3 rounded-2xl border dark:border-[#444]">
                    <img src="${p.img}" class="w-10 h-10 object-cover rounded-lg">
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-bold dark:text-white truncate">${p.name}</p>
                        <p class="text-[10px] text-gray-400">${p.price} ฿</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="updateQty(${p.id}, -1)" class="text-red-400"><i class="fas fa-minus-circle text-lg"></i></button>
                        <span class="font-bold dark:text-white text-sm">${p.qty}</span>
                        <button onclick="updateQty(${p.id}, 1)" class="text-green-500"><i class="fas fa-plus-circle text-lg"></i></button>
                    </div>
                </div>`).join('') || '<p class="text-center py-8 text-gray-400">ว่างเปล่า</p>';

            document.getElementById('displayTotal').innerText = `${final} ฿`;
        }

        function calculateTotal() {
            let total = products.reduce((sum, p) => sum + (p.price * p.qty), 0);
            let discount = 0;
            if(isPromoActive) {
                const promoItems = products.filter(p => p.name.includes("ดินสอพอง"));
                const totalQty = promoItems.reduce((s, p) => s + p.qty, 0);
                discount = Math.floor(totalQty / 3) * 10;
            }
            return { final: total - discount };
        }

        function goToCheckout() {
            const { final } = calculateTotal();
            if(final <= 0) return;
            const payType = document.querySelector('input[name="payType"]:checked').value;
            if(payType === 'สแกนจ่าย') {
                document.getElementById('cartSummarySection').classList.add('hidden');
                document.getElementById('qrCheckoutSection').classList.remove('hidden');
                document.getElementById('qrFinalTotal').innerText = `${final} ฿`;
                const qrImg = document.getElementById('qrDisplayImg');
                qrImg.src = `https://promptpay.io/${PROMPTPAY_ID}/${final}.png`;
                qrImg.onload = () => { qrImg.classList.remove('hidden'); document.getElementById('qrNoImgMsg').classList.add('hidden'); };
            } else { finishOrder(); }
        }

        async function finishOrder() {
            showLoading(true);
            const { final } = calculateTotal();
            const orderData = {
                action: 'checkout',
                totalPrice: final,
                seller: currentUser.name,
                payType: document.querySelector('input[name="payType"]:checked').value,
                cart: products.filter(p => p.qty > 0)
            };
            try {
                const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(orderData) });
                if((await resp.json()).success) { alert("บันทึกสำเร็จ!"); location.reload(); }
            } catch (e) { alert("เกิดข้อผิดพลาด"); }
            showLoading(false);
        }

        function openCart() { document.getElementById('cartModal').classList.remove('hidden'); renderCartItems(); }
        function closeCart() { document.getElementById('cartModal').classList.add('hidden'); }
        function backToCartSummary() { document.getElementById('qrCheckoutSection').classList.add('hidden'); document.getElementById('cartSummarySection').classList.remove('hidden'); }
        function showLoading(s) { document.getElementById('loader').classList.toggle('hidden', !s); }
        function toggleView(v) { document.getElementById('shopView').classList.toggle('hidden', v !== 'shop'); document.getElementById('adminSettingsView').classList.toggle('hidden', v !== 'admin'); }
        function openAdminSettings() { toggleView('admin'); }
        function updatePromoState() { isPromoActive = document.getElementById('promoToggle').checked; localStorage.setItem('promo_state', isPromoActive); }
        function clearCart() { products.forEach(p => p.qty = 0); renderShop(); closeCart(); }
        function handleLogout() { localStorage.removeItem('pos_user'); location.reload(); }

        initApp();
    </script>
</body>
</html>
